<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Nails Beauty</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/login.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container d-flex justify-content-center align-items-center vh-100">
    <div class="card login-card p-4 shadow-lg">
        <div class="text-center mb-4">
            <i class="bi bi-flower1 login-icon"></i>
            <h2 class="fw-bold text-pink">Nails Beauty</h2>
            <p class="text-muted">Inicia sesión para continuar</p>
        </div>

        <!-- Formulario de login -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Correo electrónico</label>
                <input type="email" class="form-control" name="correo" placeholder="Ingresa tu correo" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Contraseña</label>
                <input type="password" class="form-control" name="clave" placeholder="Ingresa tu contraseña" required>
            </div>

            <button type="submit" class="btn btn-pink w-100">Entrar</button>
        </form>

        <!-- Mensajes -->
        <div th:if="${error}" class="alert alert-danger mt-3 text-center" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success mt-3 text-center" th:text="${success}"></div>

        <div class="text-center mt-4">
            <p class="text-muted mb-0">¿No tienes cuenta?</p>
            <a th:href="@{/register}" class="text-pink fw-semibold text-decoration-none">Regístrate aquí</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</body>
</html>
