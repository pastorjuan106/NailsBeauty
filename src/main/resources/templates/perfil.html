<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Nails Beauty | Mi Perfil</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="/css/perfil.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body>

	<!-- ===== HEADER / NAVBAR ===== -->
	<header class="shadow-sm sticky-top">
		<nav class="navbar navbar-expand-lg">
			<div class="container">
				<a class="navbar-brand d-flex align-items-center" th:href="@{/}">
					<i class="bi bi-flower1"></i> Nails Beauty
				</a>

				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="collapse navbar-collapse justify-content-end" id="navbarNav">
					<ul class="navbar-nav align-items-center">
						<li class="nav-item">
							<a class="nav-link" th:href="@{/}">Inicio</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" th:href="@{'/' + '#servicios'}">Servicios</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" th:href="@{/contacto/form}">Contáctanos</a>
						</li>

						<!-- Si NO hay usuario logeado -->
						<li class="nav-item ms-3" th:if="${usuarioLogeado == null}">
							<a th:href="@{/login}" class="btn btn-outline-pink btn-sm me-2">
								<i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesión
							</a>
							<a th:href="@{/register}" class="btn btn-pink btn-sm">
								<i class="bi bi-person-plus me-1"></i> Registrarse
							</a>
						</li>

						<!-- Si SÍ hay usuario logeado -->
						<li class="nav-item dropdown" th:if="${usuarioLogeado != null}">
							<a class="dropdown-toggle nav-link" href="#" data-bs-toggle="dropdown">
								<span th:text="'Hola, ' + ${usuarioLogeado.nombre}"></span>
							</a>
							<ul class="dropdown-menu dropdown-menu-end">
								<li th:if="${usuarioLogeado.rol.name() == 'ADMIN'}">
									<a class="dropdown-item" th:href="@{/admin/agenda/dashboard}">Dashboard</a>
								</li>
								<li><a class="dropdown-item" th:href="@{/perfil}">Mi Perfil</a></li>
								<li><a class="dropdown-item" th:href="@{/reservas}">Mis Reservas</a></li>
								<li>
									<hr class="dropdown-divider">
								</li>
								<li><a class="dropdown-item text-danger" th:href="@{/logout}">Cerrar sesión</a></li>
							</ul>
						</li>
					</ul>
				</div>
			</div>
		</nav>
	</header>

	<!-- ===== PERFIL ===== -->
	<div class="main-wrapper">
		<div class="main-content">
			<div class="perfil-container">
				<h3><i class="bi bi-person-circle me-2"></i> Mi Perfil</h3>
				<!-- Mensajes -->
				<div th:if="${success}" class="alert alert-success text-center" th:text="${success}">
				</div>
				<div th:if="${error}" class="alert alert-danger text-center" th:text="${error}">
				</div>

				<!-- FORMULARIO -->
				<form th:action="@{/perfil/guardar}" th:object="${usuarioLogeado}" method="post">
					<div class="row g-3">
						<div class="col-md-6">
							<label class="form-label fw-semibold">Nombre</label>
							<input type="text" th:field="*{nombre}" class="form-control form-control-sm" required>
						</div>
						<div class="col-md-6">
							<label class="form-label fw-semibold">Apellido Paterno</label>
							<input type="text" th:field="*{apellidoPaterno}" class="form-control form-control-sm"
								required>
						</div>
						<div class="col-md-6">
							<label class="form-label fw-semibold">Apellido Materno</label>
							<input type="text" th:field="*{apellidoMaterno}" class="form-control form-control-sm"
								required>
						</div>
						<div class="col-md-6">
							<label class="form-label fw-semibold">Celular</label>
							<input type="text" th:field="*{celular}" class="form-control form-control-sm">
						</div>
					</div>

					<hr class="my-4">

					<h5 class="text-pink mb-3"><i class="bi bi-lock-fill me-2"></i>Cambiar
						Contraseña</h5>

					<div class="mb-3">
						<label class="form-label">Contraseña Actual</label>
						<input type="password" name="claveActual" class="form-control form-control-sm">
					</div>
					<div class="mb-3">
						<label class="form-label">Nueva Contraseña</label>
						<input type="password" name="nuevaClave" class="form-control form-control-sm">
					</div>
					<div class="mb-4">
						<label class="form-label">Confirmar Nueva Contraseña</label>
						<input type="password" name="confirmarClave" class="form-control form-control-sm">
					</div>

					<div class="text-center">
						<button type="submit" class="btn btn-pink px-4">
							<i class="bi bi-check-circle me-1"></i> Guardar Cambios
						</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<!-- ===== FOOTER ===== -->
	<footer class="text-center py-3 border-top">
		<small>© 2025 Nails Beauty - Todos los derechos reservados</small>
	</footer>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
