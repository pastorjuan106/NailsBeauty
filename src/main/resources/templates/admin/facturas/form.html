<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
	<meta charset="UTF-8">
	<title th:text="${factura.id != null} ? 'Editar Factura' : 'Nueva Factura'">Factura</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link href="/css/admin-layout.css" rel="stylesheet">
	<style>
		:root {
			--pink: #d63384;
			--pink-dark: #b3005e;
			--gold: #d4af37;
			--light-pink: #fff7fa;
		}

		.navbar {
			background: linear-gradient(135deg, var(--pink), var(--pink-dark));
		}

		.navbar-brand,
		.nav-link {
			color: white !important;
		}

		.text-pink {
			color: var(--pink) !important;
		}

		.btn-pink {
			background-color: var(--pink);
			color: white;
			border: none;
		}

		.btn-pink:hover {
			background-color: var(--pink-dark);
			color: white;
		}

		.form-card {
			background: white;
			border-radius: 15px;
			padding: 30px;
			box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
		}

		.form-label {
			font-weight: 500;
			color: #333;
		}

		.form-control:focus,
		.form-select:focus {
			border-color: var(--pink);
			box-shadow: 0 0 0 0.2rem rgba(214, 51, 132, 0.15);
		}

		.calc-summary {
			background: var(--light-pink);
			border-radius: 10px;
			padding: 20px;
			margin-top: 20px;
		}

		.calc-row {
			display: flex;
			justify-content: space-between;
			padding: 5px 0;
		}

		.calc-total {
			border-top: 2px solid var(--pink);
			margin-top: 10px;
			padding-top: 10px;
			font-size: 18px;
			font-weight: 700;
			color: var(--pink);
		}
	</style>
</head>

<body>

	<!-- ===== HEADER / NAVBAR ===== -->
	<header class="shadow-sm sticky-top">
		<nav class="navbar navbar-expand-lg">
			<div class="container">
				<a class="navbar-brand d-flex align-items-center" th:href="@{/}">
					<i class="bi bi-flower1"></i> Nails Beauty
				</a>

				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="collapse navbar-collapse justify-content-end" id="navbarNav">
					<ul class="navbar-nav align-items-center">
						<li class="nav-item">
							<a class="nav-link" th:href="@{/}">Inicio</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" th:href="@{/admin/agenda/dashboard}">Dashboard</a>
						</li>

						<li class="nav-item dropdown" th:if="${usuarioLogeado != null}">
							<a class="dropdown-toggle nav-link" href="#" data-bs-toggle="dropdown">
								<span th:text="'Hola, ' + ${usuarioLogeado.nombre}"></span>
							</a>
							<ul class="dropdown-menu dropdown-menu-end">
								<li><a class="dropdown-item" th:href="@{/perfil}">Mi Perfil</a></li>
								<li>
									<hr class="dropdown-divider">
								</li>
								<li><a class="dropdown-item text-danger" th:href="@{/logout}">Cerrar sesión</a></li>
							</ul>
						</li>
					</ul>
				</div>
			</div>
		</nav>
	</header>

	<!-- ===== CONTENIDO ===== -->
	<main class="container-fluid px-4 py-3">
		<div class="row">
			<!-- Sidebar -->
			<div class="col-lg-3 mb-4">
				<div class="card border-0 shadow-sm sidebar">
					<div class="card-body p-3">
						<div th:replace="~{fragments/admin-sidebar :: adminSidebar(activePage='facturas')}"></div>
					</div>
				</div>
			</div>

			<!-- Contenido principal -->
			<div class="col-lg-9">

				<div class="text-center mb-4">
					<h1 class="fw-bold text-pink mb-1" th:text="${factura.id != null} ? 'Editar Factura' : 'Nueva Factura'">Factura</h1>
					<p class="text-muted mb-0" th:text="${factura.id != null} ? 'Modifica los datos de la factura' : 'Completa los datos para generar la factura'"></p>
				</div>

				<!-- Mensajes flash -->
				<div th:if="${success}" class="alert alert-success alert-dismissible fade show">
					<span th:text="${success}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>
				<div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
					<span th:text="${error}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>

				<div class="form-card">
					<form th:action="@{/admin/facturas/guardar}" method="post" id="facturaForm">
						<input type="hidden" name="id" th:value="${factura.id}">

						<!-- Datos del Comprobante -->
						<h5 class="text-pink mb-3"><i class="bi bi-receipt me-2"></i>Datos del Comprobante</h5>

						<div class="row mb-3">
							<div class="col-md-6">
								<label class="form-label">N° Comprobante</label>
								<input type="text" class="form-control" th:value="${factura.numeroComprobante}" readonly
									style="background-color: #f8f9fa;">
							</div>
							<div class="col-md-6">
								<label class="form-label">Fecha de Emisión</label>
								<input type="text" class="form-control"
									th:value="${factura.fechaEmision != null} ? ${T(java.time.format.DateTimeFormatter).ofPattern('dd/MM/yyyy HH:mm').format(factura.fechaEmision)} : 'Se generará al guardar'"
									readonly style="background-color: #f8f9fa;">
							</div>
						</div>

						<!-- Datos de la Empresa -->
						<div class="row mb-3">
							<div class="col-md-4">
								<label class="form-label">Nombre Comercial</label>
								<input type="text" class="form-control" value="Nails Beauty" readonly
									style="background-color: #f8f9fa;">
							</div>
							<div class="col-md-4">
								<label class="form-label">RUC</label>
								<input type="text" class="form-control" value="20512684759" readonly
									style="background-color: #f8f9fa;">
							</div>
							<div class="col-md-4">
								<label class="form-label">Dirección</label>
								<input type="text" class="form-control" value="Av. Ejemplo 123, Lima" readonly
									style="background-color: #f8f9fa;">
							</div>
						</div>

						<hr class="my-4">

						<!-- Datos del Cliente y Servicio -->
						<h5 class="text-pink mb-3"><i class="bi bi-person me-2"></i>Cliente y Servicio</h5>

						<div class="row mb-3">
							<div class="col-md-6">
								<label class="form-label">Cliente</label>
								<input type="text" class="form-control" th:value="${factura.clienteNombre}" readonly
									style="background-color: #f8f9fa;">
							</div>
							<div class="col-md-6">
								<label class="form-label">Correo del Cliente</label>
								<input type="email" class="form-control" th:value="${factura.clienteCorreo}" readonly
									style="background-color: #f8f9fa;">
							</div>
						</div>

						<div class="row mb-3">
							<div class="col-md-6">
								<label class="form-label">Servicio</label>
								<input type="text" class="form-control" th:value="${factura.servicioNombre}" readonly
									style="background-color: #f8f9fa;">
							</div>
							<div class="col-md-6">
								<label class="form-label">Precio del Servicio</label>
								<input type="text" class="form-control"
									th:value="${factura.precioServicio != null} ? ${'S/. ' + T(java.lang.String).format('%.2f', factura.precioServicio)} : 'S/. 0.00'"
									readonly style="background-color: #f8f9fa;">
							</div>
						</div>

						<hr class="my-4">

						<!-- Datos de Pago -->
						<h5 class="text-pink mb-3"><i class="bi bi-credit-card me-2"></i>Datos de Pago</h5>

						<div class="row mb-3">
							<div class="col-md-6">
								<label class="form-label">Método de Pago *</label>
								<select name="metodoPago" class="form-select" required id="metodoPago">
									<option value="">Seleccione...</option>
									<option th:each="metodo : ${metodosPago}"
										th:value="${metodo}"
										th:text="${metodo.valor}"
										th:selected="${factura.metodoPago == metodo}">
									</option>
								</select>
							</div>
							<div class="col-md-6">
								<label class="form-label">Descuento (S/.)</label>
								<input type="number" name="descuento" class="form-control" step="0.01" min="0"
									th:value="${factura.descuento != null} ? ${factura.descuento} : '0.00'"
									id="descuento" onchange="calcularTotal()">
							</div>
						</div>

						<div class="mb-3">
							<label class="form-label">Observaciones</label>
							<textarea name="observaciones" class="form-control" rows="3"
								placeholder="Notas adicionales (opcional)..."
								th:text="${factura.observaciones}"></textarea>
						</div>

						<!-- Resumen de Cálculos -->
						<div class="calc-summary">
							<h6 class="fw-bold mb-3">Resumen</h6>
							<div class="calc-row">
								<span>Precio del servicio:</span>
								<span th:text="${factura.precioServicio != null} ? ${'S/. ' + T(java.lang.String).format('%.2f', factura.precioServicio)} : 'S/. 0.00'"></span>
							</div>
							<div class="calc-row">
								<span>Descuento:</span>
								<span class="text-danger" id="descuentoDisplay"
									th:text="${'S/. ' + T(java.lang.String).format('%.2f', factura.descuento != null ? factura.descuento : 0)}"></span>
							</div>
							<div class="calc-row">
								<span>IGV (18%):</span>
								<span id="igvDisplay"
									th:text="${factura.igv != null} ? ${'S/. ' + T(java.lang.String).format('%.2f', factura.igv)} : 'S/. 0.00'"></span>
							</div>
							<div class="calc-row calc-total">
								<span>Total a Pagar:</span>
								<span id="totalDisplay"
									th:text="${factura.totalPagar != null} ? ${'S/. ' + T(java.lang.String).format('%.2f', factura.totalPagar)} : 'S/. 0.00'"></span>
							</div>
						</div>

						<!-- Botones -->
						<div class="d-flex justify-content-between mt-4">
							<a th:href="@{/admin/facturas}" class="btn btn-outline-secondary">
								<i class="bi bi-arrow-left me-1"></i> Cancelar
							</a>
							<div>
								<button type="submit" class="btn btn-pink px-4">
									<i class="bi bi-check-lg me-1"></i> Guardar Factura
								</button>
							</div>
						</div>
					</form>
				</div>
			</div>
		</div>
	</main>

	<!-- ===== FOOTER ===== -->
	<footer class="text-center py-3 border-top">
		<small>© 2026 Nails Beauty - Todos los derechos reservados</small>
	</footer>

	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:inline="javascript">
		var precioServicio = [[${factura.precioServicio}]];

		function calcularTotal() {
			var precio = parseFloat(precioServicio) || 0;
			var descuento = parseFloat(document.getElementById('descuento').value) || 0;
			var igv = (precio - descuento) * 0.18;
			var total = (precio - descuento) + igv;

			document.getElementById('descuentoDisplay').textContent = 'S/. ' + descuento.toFixed(2);
			document.getElementById('igvDisplay').textContent = 'S/. ' + igv.toFixed(2);
			document.getElementById('totalDisplay').textContent = 'S/. ' + total.toFixed(2);
		}
	</script>
</body>

</html>
