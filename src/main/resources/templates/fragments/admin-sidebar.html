<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<body>

	<!-- ===== SIDEBAR ADMIN FRAGMENT ===== -->
	<div th:fragment="adminSidebar(activePage)">
		<div class="sidebar-header mb-3">
			<h6 class="text-muted text-uppercase fw-bold mb-2" style="font-size: 11px; letter-spacing: 1px;">
				<i class="bi bi-grid me-1"></i> Panel de Administración
			</h6>
			<hr class="my-2" style="border-color: #e0e0e0;">
		</div>

		<div class="list-group list-group-flush">
			<a th:href="@{/admin/agenda/dashboard}"
				th:classappend="${activePage == 'dashboard'} ? 'active'"
				class="list-group-item list-group-item-action border-0 rounded-3 mb-1">
				<i class="bi bi-speedometer2 me-2"></i> Dashboard
			</a>
			<a th:href="@{/admin/servicios}"
				th:classappend="${activePage == 'servicios'} ? 'active'"
				class="list-group-item list-group-item-action border-0 rounded-3 mb-1">
				<i class="bi bi-scissors me-2"></i> Servicios
			</a>
			<a th:href="@{/admin/reservas}"
				th:classappend="${activePage == 'reservas'} ? 'active'"
				class="list-group-item list-group-item-action border-0 rounded-3 mb-1">
				<i class="bi bi-calendar-check me-2"></i> Reservas
			</a>
			<a th:href="@{/admin/facturas}"
				th:classappend="${activePage == 'facturas'} ? 'active'"
				class="list-group-item list-group-item-action border-0 rounded-3 mb-1">
				<i class="bi bi-receipt me-2"></i> Facturas
			</a>
			<a th:href="@{/admin/usuarios}"
				th:classappend="${activePage == 'usuarios'} ? 'active'"
				class="list-group-item list-group-item-action border-0 rounded-3 mb-1">
				<i class="bi bi-people me-2"></i> Usuarios
			</a>
			<a th:href="@{/contacto}"
				th:classappend="${activePage == 'contactos'} ? 'active'"
				class="list-group-item list-group-item-action border-0 rounded-3 mb-1">
				<i class="bi bi-envelope me-2"></i> Mensajes
			</a>
		</div>
	</div>

</body>
</html>
