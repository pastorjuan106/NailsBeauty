<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Registro - Nails Beauty</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/register.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="register-container d-flex justify-content-center align-items-center">
  <div class="card register-card p-4 shadow-lg">
    <div class="text-center mb-3">
      <i class="bi bi-flower1 login-icon"></i>
      <h2 class="fw-bold text-pink">Crear cuenta</h2>
      <p class="text-muted mb-0">Crea tu cuenta y comienza tu experiencia</p>
    </div>

    <form th:action="@{/register}" th:object="${usuario}" method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Nombre:</label>
          <input type="text" class="form-control" th:field="*{nombre}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Apellido Paterno:</label>
          <input type="text" class="form-control" th:field="*{apellidoPaterno}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Apellido Materno:</label>
          <input type="text" class="form-control" th:field="*{apellidoMaterno}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Celular:</label>
          <input type="text" class="form-control" th:field="*{celular}">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Correo:</label>
          <input type="email" class="form-control" th:field="*{correo}" required>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Contraseña:</label>
          <input type="password" class="form-control" th:field="*{clave}" required>
        </div>
      </div>

      <button type="submit" class="btn btn-pink w-100 mt-3">Registrarse</button>
    </form>

    <p th:if="${error}" th:text="${error}" class="alert alert-danger mt-3 text-center"></p>
    <p th:if="${success}" th:text="${success}" class="alert alert-success mt-3 text-center"></p>

    <div class="text-center mt-3">
      <p class="text-muted mb-1">¿Ya tienes cuenta?</p>
      <a th:href="@{/login}" class="text-pink fw-semibold text-decoration-none">Inicia sesión aquí</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</body>
</html>
