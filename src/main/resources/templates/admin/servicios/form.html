<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
	<meta charset="UTF-8">
	<title th:text="${servicio.id != null} ? 'Editar Servicio' : 'Nuevo Servicio'">Nuevo Servicio</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/listaServicio.css}">
</head>

<body>

	<!-- ===== HEADER / NAVBAR ===== -->
	<header class="shadow-sm sticky-top">
		<nav class="navbar navbar-expand-lg">
			<div class="container">
				<a class="navbar-brand d-flex align-items-center" th:href="@{/}">
					<i class="bi bi-flower1"></i> Nails Beauty
				</a>

				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="collapse navbar-collapse justify-content-end" id="navbarNav">
					<ul class="navbar-nav align-items-center">
						<li class="nav-item">
							<a class="nav-link" th:href="@{/}">Inicio</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" th:href="@{'/' + '#servicios'}">Servicios</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" th:href="@{/contacto/form}">Contacto</a>
						</li>

						<!-- Si NO hay usuario logeado -->
						<li class="nav-item ms-3" th:if="${usuarioLogeado == null}">
							<a th:href="@{/login}" class="btn btn-outline-pink btn-sm me-2">
								<i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesión
							</a>
							<a th:href="@{/register}" class="btn btn-pink btn-sm">
								<i class="bi bi-person-plus me-1"></i> Registrarse
							</a>
						</li>

						<!-- Si SÍ hay usuario logeado -->
						<li class="nav-item dropdown" th:if="${usuarioLogeado != null}">
							<a class="dropdown-toggle nav-link" href="#" data-bs-toggle="dropdown">
								<span th:text="'Hola, ' + ${usuarioLogeado.nombre}"></span>
							</a>
							<ul class="dropdown-menu dropdown-menu-end">
								<li th:if="${usuarioLogeado.rol.name() == 'ADMIN'}">
									<a class="dropdown-item" th:href="@{/admin/agenda/dashboard}">Dashboard</a>
								</li>
								<li><a class="dropdown-item" th:href="@{/perfil}">Mi Perfil</a></li>
								<li><a class="dropdown-item" th:href="@{/reservas}">Mis Reservas</a></li>
								<li>
									<hr class="dropdown-divider">
								</li>
								<li><a class="dropdown-item text-danger" th:href="@{/logout}">Cerrar sesión</a></li>
							</ul>
						</li>
					</ul>
				</div>
			</div>
		</nav>
	</header>

	<!-- CONTENIDO -->
	<main class="container my-5">

		<div class="text-center mb-5">
			<h1 class="fw-bold text-pink mb-1" th:text="${servicio.id != null} ? 'Editar Servicio' : 'Nuevo Servicio'">
				Nuevo Servicio
			</h1>
			<p class="text-muted mb-0">Completa la información para registrar o actualizar el servicio.</p>
		</div>

		<!-- FORMULARIO -->
		<form th:action="@{/admin/servicios/guardar}" th:object="${servicio}" method="post"
			class="card shadow-sm p-4 mb-5" style="border-radius: 12px; background-color: #fff7fa;">

			<input type="hidden" th:field="*{id}" />

			<div class="mb-3">
				<label class="form-label fw-semibold">Nombre del Servicio</label>
				<input type="text" class="form-control" th:field="*{nombreServicio}" required>
			</div>

			<div class="mb-3">
				<label class="form-label fw-semibold">Descripción</label>
				<textarea class="form-control" th:field="*{descripcion}" rows="3"></textarea>
			</div>

			<div class="row g-3 mb-3">
				<div class="col-md-6">
					<label class="form-label fw-semibold">Duración (minutos)</label>
					<input type="number" class="form-control" th:field="*{duracion}">
				</div>
				<div class="col-md-6">
					<label class="form-label fw-semibold">Precio (S/)</label>
					<input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
				</div>
			</div>

			<div class="mb-3">
				<label class="form-label fw-semibold">URL de Imagen</label>
				<input type="text" class="form-control" th:field="*{imagenUrl}">
			</div>

			<div class="mb-4">
				<label class="form-label fw-semibold">Estado</label>
				<select class="form-select" th:field="*{estado}">
					<option th:value="DISPONIBLE"
						th:text="${T(pe.nailsbeauty.entity.ServicioEntity.EstadoServicio).DISPONIBLE.valor}">Disponible
					</option>
					<option th:value="NO_DISPONIBLE"
						th:text="${T(pe.nailsbeauty.entity.ServicioEntity.EstadoServicio).NO_DISPONIBLE.valor}">No
						Disponible</option>
				</select>
			</div>

			<div class="d-flex justify-content-between">
				<a th:href="@{/admin/servicios}" class="btn btn-outline-pink">Volver a la lista</a>
				<button type="submit" class="btn btn-pink">Guardar</button>
			</div>

		</form>

	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
