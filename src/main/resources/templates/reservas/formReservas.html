<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Nueva Reserva | Nails Beauty</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/index.css" rel="stylesheet">
  <link href="/css/formReserva.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

</head>
<body>

	<!-- ===== HEADER / NAVBAR ===== -->
		<header class="shadow-sm sticky-top">
		    <nav class="navbar navbar-expand-lg">
		        <div class="container">
		            <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
		                <i class="bi bi-flower1"></i> Nails Beauty
		            </a>

		            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
		                <span class="navbar-toggler-icon"></span>
		            </button>

		            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
		                <ul class="navbar-nav align-items-center">
		                    <li class="nav-item">
		                        <a class="nav-link" th:href="@{/}">Inicio</a>
		                    </li>
		                    <li class="nav-item">
		                		<a class="nav-link" th:href="@{'/' + '#servicios'}">Servicios</a>
		                    </li>
		                    <li class="nav-item">
								<a class="nav-link" th:href="@{/contacto/form}">Contacto</a>
		                    </li>

		                    <!-- Si NO hay usuario logeado -->
		                    <li class="nav-item ms-3" th:if="${usuarioLogeado == null}">
		                        <a th:href="@{/login}" class="btn btn-outline-pink btn-sm me-2">
		                            <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesión
		                        </a>
		                        <a th:href="@{/register}" class="btn btn-pink btn-sm">
		                            <i class="bi bi-person-plus me-1"></i> Registrarse
		                        </a>
		                    </li>

		                    <!-- Si SÍ hay usuario logeado -->
		                    <li class="nav-item dropdown" th:if="${usuarioLogeado != null}">
		                        <a class="dropdown-toggle nav-link" href="#" data-bs-toggle="dropdown">
		                            <span th:text="'Hola, ' + ${usuarioLogeado.nombre}"></span>
		                        </a>
		                        <ul class="dropdown-menu dropdown-menu-end">
		                            <li th:if="${usuarioLogeado.rol.name() == 'ADMIN'}">
		                                <a class="dropdown-item" th:href="@{/admin/agenda/dashboard}">Dashboard</a>
		                            </li>
		                            <li><a class="dropdown-item" th:href="@{/perfil}">Mi Perfil</a></li>
		                            <li><a class="dropdown-item" th:href="@{/reservas}">Mis Reservas</a></li>
		                            <li><hr class="dropdown-divider"></li>
		                            <li><a class="dropdown-item text-danger" th:href="@{/logout}">Cerrar sesión</a></li>
		                        </ul>
		                    </li>
		                </ul>
		            </div>
		        </div>
		    </nav>
		</header>

<!-- ===== FORMULARIO DE NUEVA RESERVA ===== -->
<div class="main-wrapper">
    <div class="main-content">
<div class="reserva-container">
	<h3>
	  <i class="bi bi-calendar-check-fill me-2"></i>
	  Registrar Reserva
	</h3>

  <form th:action="@{/reservas/save}" th:object="${reserva}" method="post">
    <input type="hidden" th:field="*{id}" />

    <!-- SERVICIO -->
    <div class="mb-3">
      <label for="servicio" class="form-label">Servicio:</label>
      <select id="servicio" th:field="*{servicio.id}" class="form-select" required>
        <option value="">Seleccione un servicio</option>
        <option th:each="serv : ${services}" 
                th:value="${serv.id}" 
                th:text="${serv.nombreServicio}"></option>
      </select>
    </div>

    <!-- HORARIO -->
    <div class="mb-3">
      <label for="horario" class="form-label">Horario:</label>
      <select id="horario" th:field="*{horario.id}" class="form-select" required>
        <option value="">Seleccione un horario</option>
        <option th:each="h : ${horarios}" 
                th:value="${h.id}" 
                th:text="${h.horaInicio} + ' - ' + ${h.horaFin}"></option>
      </select>
    </div>

    <!-- FECHA -->
    <div class="mb-3">
      <label for="fecha" class="form-label">Fecha de Reserva:</label>
      <input type="date" id="fecha" th:field="*{fechaReserva}" class="form-control" required>
    </div>

    <!-- OBSERVACIÓN -->
    <div class="mb-3">
      <label for="observacion" class="form-label">Observación:</label>
      <textarea id="observacion" th:field="*{observacion}" class="form-control" rows="3" placeholder="Escriba una observación (opcional)"></textarea>
    </div>

    <!-- BOTONES -->
    <div class="text-center mt-4">
      <button type="submit" class="btn btn-guardar">Guardar</button>
      <a th:href="@{/index}" class="btn btn-cancelar">Cancelar</a>
    </div>
  </form>
</div>
</div>
 </div>

<!-- ===== FOOTER ===== -->
<footer class="text-center py-3 mt-5 border-top">
  <small>© 2025 Nails Beauty - Todos los derechos reservados</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="/js/formReserva.js"></script>
</body>
</html>
